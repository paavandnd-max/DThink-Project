<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DThink AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<script>
  function goTo(page) {
    alert("Inline working: " + page);
    window.location.href = page;
  }
</script>

<body>

<div class="bg"></div>

<header class="navbar">
  <h1>DThink</h1>
  <p>AI + AR Learning Platform</p>
</header>

<div class="container">

  <div class="card glow">
    <h2>📊 Dashboard</h2>
    <p>Track your learning progress</p>
    <button onclick="goTo('dashboard.html')">Open</button>
  </div>

  <div class="card glow">
    <h2>🧠 AI Summary</h2>
    <p>Generate smart notes using Watson</p>
    <button onclick="getSummary()">Generate</button>
    <div id="summary"></div>
  </div>

  <div class="card glow">
    <h2>🧊 AR Viewer</h2>
    <p>Visualize concepts in 3D</p>
    <button onclick="goTo('ar.html')">Start AR</button>
  </div>

  <div class="card glow">
    <h2>❓ Quiz</h2>
    <p>Test your understanding</p>
    <button onclick="startQuiz()">Start Quiz</button>
    <div id="quiz"></div>
  </div>

</div>

<script src="./script.js?v=10"></script>
</body>
</html>
