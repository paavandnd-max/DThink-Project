<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DThink AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<header class="navbar">
  <h1>DThink</h1>
  <p>AI + AR Learning Platform</p>
</header>

<div class="container">

  <div class="card glow">
    <h2>📊 Dashboard</h2>
    <p>Track your learning progress</p>
<button id="dashboardBtn">Open</button>
  </div>

  <div class="card glow">
    <h2>🧠 AI Summary</h2>
    <p>Generate smart notes using Watson</p>
   <button id="summaryBtn">Generate</button>
    <div id="summary"></div>
  </div>

  <div class="card glow">
    <h2>🧊 AR Viewer</h2>
    <p>Visualize concepts in 3D</p>
  <button id="arBtn">Start AR</button>
  </div>

  <div class="card glow">
    <h2>❓ Quiz</h2>
    <p>Test your understanding</p>
    <button id="quizBtn">Start Quiz</button>
    <div id="quiz"></div>
  </div>

</div>
<script>
  // Dashboard
  document.getElementById("dashboardBtn").onclick = function () {
    window.location.href = "dashboard.html";
  };

  // AI Summary
  document.getElementById("summaryBtn").onclick = function () {
    const box = document.getElementById("summary");
    box.innerHTML = "⏳ Generating summary...";

    setTimeout(function () {
      box.innerHTML = `
        <div style="padding:10px; border-radius:10px; background:rgba(255,255,255,0.1);">
          🤖 <strong>AI Summary</strong><br>
          The solar system consists of planets orbiting the sun.
        </div>
      `;
    }, 1000);
  };

  // AR
  document.getElementById("arBtn").onclick = function () {
    window.location.href = "ar.html";
  };

  // Quiz
  document.getElementById("quizBtn").onclick = function () {
    document.getElementById("quiz").innerHTML = `
      <p>Which is the largest planet?</p>
      <button onclick="checkAnswer('Jupiter')">Jupiter</button>
      <button onclick="checkAnswer('Mars')">Mars</button>
    `;
  };

  function checkAnswer(ans) {
    alert(ans === "Jupiter" ? "✅ Correct!" : "❌ Try again");
  }
</script>
</body>
</html>
