<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduVision AR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>EduVision AR</h1>
        <p>Scan. Learn. Visualize.</p>
    </header>

    <div class="buttons">
        <button onclick="startAR()">Start AR</button>
        <button onclick="showSummary()">View Summary</button>
        <button onclick="startQuiz()">Take Quiz</button>
    </div>

    <div id="summary" class="card"></div>
    <div id="quiz" class="card"></div>

    <div id="ar-container"></div>
</body>
</html>
