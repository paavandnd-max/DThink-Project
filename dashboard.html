<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DThink Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>DThink</h2>
    <ul>
      <li class="active">🏠 Dashboard</li>
      <li>📚 Courses</li>
      <li>🧠 AI Summary</li>
      <li>🧊 AR Viewer</li>
      <li>📊 Analytics</li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main">

    <h1>Welcome Back 👋</h1>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">📘 Courses<br><strong>5</strong></div>
      <div class="stat-card">✅ Completed<br><strong>3</strong></div>
      <div class="stat-card">⏱ Hours<br><strong>12</strong></div>
    </div>

    <!-- Courses -->
    <h2>Your Courses</h2>
    <div class="courses">

      <div class="course-card">
        <h3>AR Learning</h3>
        <p>Visual learning with AR</p>
        <button>Continue</button>
      </div>

      <div class="course-card">
        <h3>AI Basics</h3>
        <p>Introduction to AI</p>
        <button>Start</button>
      </div>

      <div class="course-card">
        <h3>WebAR</h3>
        <p>Build AR on web</p>
        <button>View</button>
      </div>

    </div>

  </div>

</div>
<script src="script.js"></script>
</body>
</html>
