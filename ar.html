<!DOCTYPE html>
<html>
<head>
  <title>AR Viewer</title>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    #ar-container {
      width: 100%;
      height: 100vh;
    }

    .start-btn {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      background: purple;
      color: white;
      border: none;
      border-radius: 10px;
      z-index: 2;
    }
  </style>
</head>

<body>

<button class="start-btn" onclick="startAR()">Start AR</button>

<div id="ar-container"></div>

<script>
async function startAR() {
  const mindarThree = new window.MINDAR.IMAGE.MindARThree({
    container: document.querySelector("#ar-container"),
    imageTargetSrc: "./targets.mind"
  });

  const { renderer, scene, camera } = mindarThree;

  const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
  scene.add(light);

  const anchor = mindarThree.addAnchor(0);

  const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
  const material = new THREE.MeshStandardMaterial({ color: 0x7c3aed });
  const cube = new THREE.Mesh(geometry, material);

  anchor.group.add(cube);

  await mindarThree.start();

  renderer.setAnimationLoop(() => {
    cube.rotation.y += 0.01;
    renderer.render(scene, camera);
  });
}
</script>

</body>
</html>
